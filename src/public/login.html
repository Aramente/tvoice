<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="color-scheme" content="dark">
  <title>Tvoice — login required</title>
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
  <link rel="stylesheet" href="/css/tvoice.css">
</head>
<body class="tvoice-body center">
  <div class="login-card">
    <h1>Tvoice</h1>
    <p class="muted">{{ERROR}}</p>
    <p>Your login link is invalid or expired.</p>
    <p>On your Mac, run:</p>
    <pre class="code">npx tvoice</pre>
    <p>and scan the new QR code.</p>
  </div>
</body>
</html>
